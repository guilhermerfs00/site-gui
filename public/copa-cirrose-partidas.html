<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚔️ Gerenciar Partidas — Copa Cirrose</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:'Poppins',sans-serif;background:#0a0a2e;color:#fff;min-height:100vh;overflow-x:hidden}

        /* BG */
        .bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
        .bg-g{position:absolute;inset:0;background:linear-gradient(135deg,#0a0a2e,#1a0a2e 40%,#0d0a35)}
        .bg-o{position:absolute;border-radius:50%;filter:blur(90px);opacity:.2;animation:oFloat 18s ease-in-out infinite}
        .bg-o:nth-child(2){width:420px;height:420px;background:#8b0000;top:-80px;right:-80px}
        .bg-o:nth-child(3){width:480px;height:480px;background:#b8860b;bottom:-120px;left:-120px;animation-delay:-6s}
        @keyframes oFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-60px)}}

        /* LAYOUT */
        .wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:14px 14px 90px}

        /* TOP BAR */
        .top-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
        .top-bar h1{flex:1;font-size:1.25rem;font-weight:900;background:linear-gradient(135deg,#ffd700,#ff6b35,#dc143c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
        .btn-back{display:flex;align-items:center;gap:6px;padding:9px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:rgba(255,255,255,.6);font-family:'Poppins',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
        .btn-back:hover{background:rgba(255,255,255,.12);color:#fff}
        .btn-placar{display:flex;align-items:center;gap:6px;padding:9px 16px;background:linear-gradient(135deg,#b8860b,#ffd700);border:none;border-radius:12px;color:#000;font-family:'Poppins',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s}
        .btn-placar:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,215,0,.4)}

        /* STATS BAR */
        .stats-bar{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
        .stat{flex:1;min-width:72px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 6px;text-align:center;transition:all .3s}
        .stat .sv{font-size:1.25rem;font-weight:900;line-height:1;margin-bottom:2px}
        .stat .sl{font-size:.55rem;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.35)}
        .stat.ao-vivo{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.07)}
        .stat.ao-vivo .sv{color:#f87171}
        .stat.aguardando .sv{color:#fbbf24}
        .stat.encerrado .sv{color:#6ee7b7}
        .stat.total .sv{color:#ffd700}

        /* FILTROS */
        .filtros{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
        .filtros select{padding:8px 12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-family:'Poppins',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;outline:none;transition:all .3s;flex:1;min-width:140px}
        .filtros select:focus{border-color:rgba(220,20,60,.5)}
        .filtros select option{background:#1a0a2e}
        .filter-btn{padding:8px 13px;border-radius:10px;font-family:'Poppins',sans-serif;font-size:.74rem;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);transition:all .2s;white-space:nowrap}
        .filter-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
        .filter-btn.active{border-color:rgba(220,20,60,.5);background:rgba(220,20,60,.15);color:#ffd700}
        .filter-btn.f-ao-vivo.active{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.15);color:#f87171}
        .filter-btn.f-ok.active{border-color:rgba(56,239,125,.4);background:rgba(56,239,125,.1);color:#6ee7b7}

        /* SEÇÃO TITULO */
        .section-title{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:3px 0}
        .section-title .st-icon{font-size:1.1rem}
        .section-title .st-text{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4)}
        .section-title .st-count{font-size:.7rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:2px 8px;color:rgba(255,255,255,.4);font-weight:700}
        .section-title.live .st-text{color:#f87171}
        .section-title.live .st-count{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:#f87171}

        /* PARTIDA CARD — INLINE */
        .pc{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:13px 15px;margin-bottom:8px;transition:all .25s;position:relative;overflow:hidden}
        .pc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:rgba(255,255,255,.1);border-radius:3px 0 0 3px;transition:background .3s}
        .pc.aguardando::before{background:rgba(251,191,36,.5)}
        .pc.em_jogo{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.05)}
        .pc.em_jogo::before{background:#ef4444}
        .pc.encerrado{opacity:.72}
        .pc.encerrado::before{background:rgba(56,239,125,.5)}

        /* Pulse para ao vivo */
        .pc.em_jogo{animation:pulseBorder 2.5s ease infinite}
        @keyframes pulseBorder{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 0 5px rgba(239,68,68,.12)}}

        /* Badge + fase */
        .pc-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:4px}
        .pc-fase{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px}
        .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:10px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
        .badge-live{background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.4)}
        .badge-wait{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
        .badge-done{background:rgba(56,239,125,.12);color:#6ee7b7;border:1px solid rgba(56,239,125,.25)}
        .badge-draw{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
        .dot-live{width:6px;height:6px;border-radius:50%;background:#f87171;animation:blink 1s ease infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

        /* Placar principal */
        .pc-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
        .pc-player{text-align:center}
        .pc-nome{font-size:.88rem;font-weight:700;margin-bottom:6px;min-height:1.4em;word-break:break-word;line-height:1.3}
        .pc-nome.vencedor{color:#ffd700}
        .pc-gols{font-size:2.2rem;font-weight:900;color:#ffd700;line-height:1;margin-bottom:4px;font-variant-numeric:tabular-nums;min-width:2ch;display:inline-block}
        .pc-trophy{font-size:.75rem;color:#6ee7b7;font-weight:700;min-height:1em}
        .pc-vs{font-size:.78rem;font-weight:900;color:rgba(255,255,255,.2);text-align:center;width:32px}

        /* Controles de gol */
        .pc-ctrl{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:2px}
        .btn-gol{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;font-size:1.15rem;font-weight:900;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Poppins',sans-serif;user-select:none;-webkit-user-select:none}
        .btn-add{background:linear-gradient(135deg,#059669,#065f46);color:#fff;box-shadow:0 3px 12px rgba(5,150,105,.35)}
        .btn-add:hover{transform:scale(1.12);box-shadow:0 4px 16px rgba(5,150,105,.5)}
        .btn-add:active{transform:scale(.95)}
        .btn-sub{background:rgba(239,68,68,.18);color:#f87171;border:1px solid rgba(239,68,68,.3)}
        .btn-sub:hover{background:rgba(239,68,68,.3)}
        .btn-sub:active{transform:scale(.95)}

        /* Ações da partida */
        .pc-actions{display:flex;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05);flex-wrap:wrap}
        .btn-action{flex:1;min-width:90px;padding:9px 12px;border-radius:10px;font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
        .btn-iniciar{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;box-shadow:0 3px 12px rgba(37,99,235,.3)}
        .btn-iniciar:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(37,99,235,.45)}
        .btn-encerrar{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;box-shadow:0 3px 12px rgba(109,40,217,.3)}
        .btn-encerrar:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(109,40,217,.45)}
        .btn-reabrir{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
        .btn-reabrir:hover{background:rgba(251,191,36,.25)}
        .btn-desfazer{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
        .btn-desfazer:hover{background:rgba(239,68,68,.22)}

        /* EMPTY */
        .empty-state{text-align:center;padding:40px 20px;color:rgba(255,255,255,.2)}
        .empty-state .e-icon{font-size:2.5rem;margin-bottom:12px;display:block;opacity:.4}
        .empty-state p{font-size:.85rem}

        /* TOAST */
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:999;padding:12px 24px;border-radius:14px;font-weight:700;font-size:.85rem;opacity:0;transition:all .4s cubic-bezier(.68,-.55,.27,1.55);pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
        .toast.success{background:rgba(56,239,125,.95);color:#064e3b;box-shadow:0 8px 24px rgba(56,239,125,.3)}
        .toast.error{background:rgba(239,68,68,.95);color:#fff;box-shadow:0 8px 24px rgba(239,68,68,.3)}
        .toast.info{background:rgba(59,130,246,.95);color:#fff}

        /* MODAL DESEMPATE */
        .modal-ov{display:none;position:fixed;inset:0;background:rgba(10,10,46,.88);z-index:100;align-items:center;justify-content:center;padding:20px}
        .modal-ov.show{display:flex}
        .modal{background:#1a0a2e;border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:28px;max-width:420px;width:100%;animation:fadeUp .3s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        .modal h3{font-size:1.1rem;font-weight:800;color:#ffd700;margin-bottom:8px}
        .modal p{font-size:.85rem;color:rgba(255,255,255,.55);margin-bottom:20px}
        .modal .escolha-btns{display:flex;flex-direction:column;gap:10px}
        .btn-escolha{padding:14px 18px;border-radius:14px;font-family:'Poppins',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;transition:all .2s;text-align:left;display:flex;align-items:center;gap:10px}
        .btn-escolha:hover{background:rgba(255,255,255,.12);border-color:rgba(255,215,0,.4);color:#ffd700;transform:translateX(4px)}
        .btn-cancelar-modal{margin-top:10px;width:100%;padding:11px;border-radius:12px;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);font-family:'Poppins',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s}
        .btn-cancelar-modal:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}

        .mr-st.draw{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}

        /* Chave subhead no lista de partidas */
        .chave-subhead{display:flex;align-items:center;gap:7px;padding:5px 12px;margin:6px 0 4px;background:rgba(255,255,255,.03);border-left:2px solid #dc143c;border-radius:0 8px 8px 0;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.5)}
        .chave-subhead .cs-bullet{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#dc143c,#8b0000);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:900;color:#fff;flex-shrink:0}
        .rodada-hdr{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:11px;margin:10px 0 6px;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:rgba(255,255,255,.45)}
        .rodada-hdr::before{content:'';display:inline-block;width:3px;height:14px;border-radius:2px;background:linear-gradient(180deg,#dc143c,#ffd700);flex-shrink:0}

        /* FAB atualizar */
        .fab{position:fixed;bottom:24px;right:20px;z-index:50;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#dc143c,#8b0000);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 20px rgba(220,20,60,.4);transition:all .2s}
        .fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(220,20,60,.6)}
        .fab:active{transform:scale(.95)}
        .fab.loading{animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Divider */
        .divider{height:1px;background:rgba(255,255,255,.06);margin:20px 0}

        /* BANNER MATA-MATA */
        .mm-banner{background:linear-gradient(135deg,rgba(109,40,217,.18),rgba(220,20,60,.12));border:1px solid rgba(109,40,217,.4);border-radius:16px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;animation:bannerGlow 3s ease infinite}
        @keyframes bannerGlow{0%,100%{box-shadow:0 0 0 0 rgba(109,40,217,0)}50%{box-shadow:0 0 18px 2px rgba(109,40,217,.2)}}
        .mm-banner-icon{font-size:2rem;flex-shrink:0}
        .mm-banner-body{flex:1;min-width:0}
        .mm-banner-title{font-size:.9rem;font-weight:800;color:#ffd700;margin-bottom:3px}
        .mm-banner-sub{font-size:.75rem;color:rgba(255,255,255,.5)}
        .btn-gerar-mm{padding:11px 20px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:12px;color:#fff;font-family:'Poppins',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;box-shadow:0 4px 14px rgba(109,40,217,.35)}
        .btn-gerar-mm:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(109,40,217,.5)}
        .btn-gerar-mm:active{transform:scale(.97)}
        .btn-gerar-mm:disabled{opacity:.5;cursor:default;transform:none}

        /* GOL CELEBRATION */
        .gol-flash{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%);z-index:9999;font-size:2.8rem;font-weight:900;color:#ffd700;pointer-events:none;text-shadow:0 0 30px rgba(255,215,0,.8),0 0 60px rgba(255,215,0,.3);animation:golFly .95s ease forwards;white-space:nowrap;letter-spacing:2px}
        @keyframes golFly{0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.35)}60%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-68%) scale(1.05)}}

        @media(max-width:560px){
            .pc-gols{font-size:2rem}
            .pc-nome{font-size:.8rem}
            .btn-gol{width:36px;height:36px;font-size:1.1rem}
            .top-bar h1{font-size:1.05rem}
        }
    </style>
</head>
<body>
<div class="bg"><div class="bg-g"></div><div class="bg-o"></div><div class="bg-o"></div></div>

<div class="wrap">
    <!-- TOP BAR -->
    <div class="top-bar">
        <h1>⚔️ Gerenciar Partidas</h1>
        <a class="btn-back" href="/copa-cirrose.html">← Organizar</a>
        <button class="btn-placar" onclick="window.open('/copa-cirrose-publico.html','_blank')">👁️ Placar Público</button>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar">
        <div class="stat ao-vivo"><div class="sv" id="st-live">0</div><div class="sl">Ao Vivo</div></div>
        <div class="stat aguardando"><div class="sv" id="st-wait">0</div><div class="sl">Aguardando</div></div>
        <div class="stat encerrado"><div class="sv" id="st-done">0</div><div class="sl">Encerradas</div></div>
        <div class="stat total"><div class="sv" id="st-total">0</div><div class="sl">Total</div></div>
    </div>

    <!-- FILTROS -->
    <div class="filtros">
        <select id="f-categoria" onchange="renderPartidas()">
            <option value="">🏆 Todas as Categorias</option>
        </select>
        <button class="filter-btn active" id="fb-todas" onclick="setFiltro('')">Todas</button>
        <button class="filter-btn f-ao-vivo" id="fb-live" onclick="setFiltro('em_jogo')">🔴 Ao Vivo</button>
        <button class="filter-btn" id="fb-wait" onclick="setFiltro('agendado')">⏳ Aguardando</button>
        <button class="filter-btn f-ok" id="fb-done" onclick="setFiltro('encerrado')">✅ Encerradas</button>
    </div>

    <!-- BANNER MATA-MATA -->
    <div id="banner-mata-mata"></div>

    <!-- LISTA DE PARTIDAS -->
    <div id="lista-partidas"></div>
</div>

<!-- MODAL DESEMPATE -->
<div class="modal-ov" id="modal-desempate">
    <div class="modal">
        <h3>⚽ Mata-Mata — Quem avança?</h3>
        <p id="modal-empate-info">Partida empatada. Escolha o vencedor:</p>
        <div class="escolha-btns" id="modal-escolha-btns"></div>
        <button class="btn-cancelar-modal" onclick="fecharDesempate()">Cancelar</button>
    </div>
</div>

<button class="fab" id="fab-reload" onclick="reload()" title="Atualizar">🔄</button>
<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let D = { categorias:[], jogadores:[], partidas:[] };
let filtroStatus = '';
let encerrandoPartidaId = null;

// ===== UTILS =====
async function api(url, method='GET', body=null) {
    const opts = { method, headers:{'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(url, opts);
    if (!r.ok) { const t = await r.text(); throw new Error(t); }
    return r.json();
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function nomeById(id) { const j = (D.jogadores||[]).find(j=>j.id===id); return j ? j.nome : '?'; }
function catById(id) { return (D.categorias||[]).find(c=>c.id===id); }
function toast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast '+type+' show';
    clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), 3000);
}

const FASE_LABEL = {grupos:'Grupos',oitavas:'Oitavas',quartas:'Quartas',semifinal:'Semifinal',terceiro:'3º Lugar',final:'Final'};
const FASE_ORDER = ['grupos','oitavas','quartas','semifinal','terceiro','final'];

// ===== INIT =====
async function init() {
    try {
        const data = await api('/api/cirrose');
        Object.assign(D, data);
        populateCatSelect();
        renderStats();
        renderBannerMataMata();
        renderPartidas();
    } catch(e) { toast('Erro ao carregar: '+e.message,'error'); }
}

async function reload() {
    const fab = document.getElementById('fab-reload');
    fab.classList.add('loading');
    try {
        const data = await api('/api/cirrose');
        Object.assign(D, data);
        renderStats();
        renderBannerMataMata();
        renderPartidas();
        toast('Atualizado!','success');
    } catch(e) { toast('Erro: '+e.message,'error'); }
    finally { setTimeout(()=>fab.classList.remove('loading'), 600); }
}

function populateCatSelect() {
    const el = document.getElementById('f-categoria');
    el.innerHTML = '<option value="">🏆 Todas as Categorias</option>' +
        (D.categorias||[]).map(c=>`<option value="${c.id}">${esc(c.nome)}</option>`).join('');
}

// ===== BANNER MATA-MATA =====
function renderBannerMataMata() {
    const banners = (D.categorias||[]).map(cat => {
        const grupos = (D.partidas||[]).filter(p => p.categoriaId===cat.id && p.fase==='grupos');
        if (!grupos.length) return '';
        const todosDone = grupos.every(p => p.status==='encerrado');
        if (!todosDone) return '';
        const temMM = (D.partidas||[]).some(p => p.categoriaId===cat.id && p.fase!=='grupos');
        if (temMM) return '';
        return `<div class="mm-banner">
            <div class="mm-banner-icon">⚔️</div>
            <div class="mm-banner-body">
                <div class="mm-banner-title">Fase de grupos encerrada — ${esc(cat.nome)}</div>
                <div class="mm-banner-sub">Todos os ${grupos.length} jogos encerrados. Pronto para gerar o mata-mata!</div>
            </div>
            <button class="btn-gerar-mm" id="btn-mm-${cat.id}" onclick="gerarMataMata(${cat.id})">&#9654; Gerar Mata-Mata</button>
        </div>`;
    }).join('');
    document.getElementById('banner-mata-mata').innerHTML = banners;
}

async function gerarMataMata(catId) {
    const btn = document.getElementById('btn-mm-'+catId);
    if (btn) { btn.disabled = true; btn.textContent = 'Gerando…'; }
    try {
        await api('/api/cirrose/gerar-mata-mata','POST',{categoriaId:catId});
        const data = await api('/api/cirrose');
        Object.assign(D, data);
        renderStats();
        renderBannerMataMata();
        renderPartidas();
        toast('⚔️ Mata-mata gerado!','success');
    } catch(e) {
        toast('Erro: '+e.message,'error');
        if (btn) { btn.disabled = false; btn.textContent = '▶ Gerar Mata-Mata'; }
    }
}

// ===== STATS =====
function renderStats() {
    const p = D.partidas||[];
    document.getElementById('st-live').textContent  = p.filter(x=>x.status==='em_jogo').length;
    document.getElementById('st-wait').textContent  = p.filter(x=>x.status==='agendado').length;
    document.getElementById('st-done').textContent  = p.filter(x=>x.status==='encerrado').length;
    document.getElementById('st-total').textContent = p.length;
}

// ===== FILTRO =====
function setFiltro(status) {
    filtroStatus = status;
    ['todas','live','wait','done'].forEach(k => document.getElementById('fb-'+k)?.classList.remove('active'));
    const map = {'':'fb-todas','em_jogo':'fb-live','agendado':'fb-wait','encerrado':'fb-done'};
    document.getElementById(map[status])?.classList.add('active');
    renderPartidas();
}

// ===== RENDER PARTIDAS =====
function renderPartidas() {
    const catId = parseInt(document.getElementById('f-categoria').value)||null;
    let partidas = D.partidas||[];
    if (catId) partidas = partidas.filter(p=>p.categoriaId===catId);
    if (filtroStatus) partidas = partidas.filter(p=>p.status===filtroStatus);

    const container = document.getElementById('lista-partidas');

    if (!partidas.length) {
        container.innerHTML = `<div class="empty-state">
            <span class="e-icon">⚽</span>
            <p>Nenhuma partida encontrada com esses filtros.</p>
        </div>`;
        return;
    }

    // Agrupar por categoria + fase (mantendo posição ao iniciar jogo)
    const grupos = {};
    partidas.forEach(p => {
        const cat = catById(p.categoriaId);
        const catNome = cat ? cat.nome : 'Sem categoria';
        const fase = FASE_LABEL[p.fase]||p.fase||'Grupos';
        const key = catNome+'|'+FASE_ORDER.indexOf(p.fase);
        if (!grupos[key]) grupos[key] = { catNome, fase, faseIdx: FASE_ORDER.indexOf(p.fase), partidas:[] };
        grupos[key].partidas.push(p);
    });

    let html = '';

    // Restantes agrupados
    const keys = Object.keys(grupos).sort((a,b)=> {
        const [na,ia]= a.split('|'); const [nb,ib]=b.split('|');
        return na.localeCompare(nb) || parseInt(ia)-parseInt(ib);
    });
    keys.forEach(key => {
        const g = grupos[key];
        html += `<div class="section-title">
            <span class="st-icon">${g.faseIdx===0?'\u26bd':'\u2694\ufe0f'}</span>
            <span class="st-text">${esc(g.catNome)} \u00b7 ${esc(g.fase)}</span>
            <span class="st-count">${g.partidas.length}</span>
        </div>`;
        if (g.faseIdx === 0) {
            // grupos: intercalar por rodada, dentro de cada rodada ordenar por chave
            const allRounds = new Set();
            g.partidas.forEach(p => allRounds.add(p.rodada||1));
            const porChave = {};
            g.partidas.forEach(p => { const c = p.chaveId||'A'; if(!porChave[c]) porChave[c]=[]; porChave[c].push(p); });
            const chaveKeys = Object.keys(porChave).sort();
            Array.from(allRounds).sort((a,b)=>+a-+b).forEach(r => {
                html += `<div class="rodada-hdr">Rodada ${r}</div>`;
                chaveKeys.forEach(ck => {
                    const matches = porChave[ck].filter(p=>(p.rodada||1)===+r);
                    if (!matches.length) return;
                    const done = matches.filter(p=>p.status==='encerrado').length;
                    html += `<div class="chave-subhead"><span class="cs-bullet">${ck}</span> Chave ${ck} &mdash; ${done}/${matches.length} encerrados</div>`;
                    html += matches.map(p => cardPartida(p)).join('');
                });
            });
        } else {
            html += g.partidas.sort((a,b)=>((a.chaveId||'')+(a.rodada||0)).localeCompare((b.chaveId||'')+(b.rodada||0))).map(p => cardPartida(p)).join('');
        }
    });

    container.innerHTML = html;
}

// ===== CARD HTML =====
function cardPartida(p) {
    const n1 = nomeById(p.j1Id), n2 = nomeById(p.j2Id);
    const v1 = p.vencedorId === p.j1Id, v2 = p.vencedorId === p.j2Id;
    const cat = catById(p.categoriaId);
    const faseStr = `${cat?esc(cat.nome):''} · ${FASE_LABEL[p.fase]||p.fase}${p.chaveId?' · Chave '+p.chaveId:''}${p.rodada&&p.fase==='grupos'?' · Rodada '+p.rodada:''}`;

    const badgeHtml = {
        em_jogo:  `<span class="badge badge-live"><span class="dot-live"></span> Ao Vivo</span>`,
        agendado: `<span class="badge badge-wait">⏳ Aguardando</span>`,
        encerrado: p.vencedorId ? `<span class="badge badge-done">✓ Encerrado</span>` : `<span class="badge badge-draw">🤝 Empate</span>`,
    }[p.status]||'';

    const ctrlLeft  = p.status==='em_jogo' ? `<div class="pc-ctrl"><button class="btn-gol btn-sub" onclick="ajustarGol(event,${p.id},1,-1)">−</button><button class="btn-gol btn-add" onclick="ajustarGol(event,${p.id},1,1)">＋</button></div>` : '';
    const ctrlRight = p.status==='em_jogo' ? `<div class="pc-ctrl"><button class="btn-gol btn-sub" onclick="ajustarGol(event,${p.id},2,-1)">−</button><button class="btn-gol btn-add" onclick="ajustarGol(event,${p.id},2,1)">＋</button></div>` : '';

    let actionsHtml = '';
    if (p.status==='agendado') {
        actionsHtml = `<button class="btn-action btn-iniciar" onclick="iniciarPartida(${p.id})">▶ Iniciar Jogo</button>`;
    } else if (p.status==='em_jogo') {
        actionsHtml = `
            <button class="btn-action btn-encerrar" onclick="encerrarPartida(${p.id})">🏁 Encerrar Jogo</button>
            <button class="btn-action btn-desfazer" style="flex:0;padding:10px 14px" onclick="desfazerInicio(${p.id})">↩ Desfazer</button>`;
    } else {
        actionsHtml = `<button class="btn-action btn-reabrir" onclick="reabrirPartida(${p.id})">↩ Reabrir</button>`;
    }

    return `<div class="pc ${p.status}" id="pc-${p.id}">
        <div class="pc-meta">
            <span class="pc-fase">${faseStr}</span>
            ${badgeHtml}
        </div>
        <div class="pc-body">
            <div class="pc-player">
                <div class="pc-nome${v1?' vencedor':''}">${esc(n1||'A definir')}${v1?' 🏆':''}</div>
                <div class="pc-gols" id="g1-${p.id}">${p.gols1||0}</div>
                ${ctrlLeft}
                ${v1?'<div class="pc-trophy">✓ Vencedor</div>':'<div class="pc-trophy"></div>'}
            </div>
            <div class="pc-vs">VS</div>
            <div class="pc-player">
                <div class="pc-nome${v2?' vencedor':''}">${esc(n2||'A definir')}${v2?' 🏆':''}</div>
                <div class="pc-gols" id="g2-${p.id}">${p.gols2||0}</div>
                ${ctrlRight}
                ${v2?'<div class="pc-trophy">✓ Vencedor</div>':'<div class="pc-trophy"></div>'}
            </div>
        </div>
        <div class="pc-actions">${actionsHtml}</div>
    </div>`;
}

// ===== AÇÕES =====
async function iniciarPartida(id) {
    try {
        await api('/api/cirrose/partidas/'+id,'PUT',{status:'em_jogo'});
        atualizarPartida(id, {status:'em_jogo'});
        renderStats(); renderPartidasManterPosicao(id);
        toast('Jogo iniciado! ▶','success');
    } catch(e) { toast('Erro: '+e.message,'error'); }
}

async function desfazerInicio(id) {
    try {
        await api('/api/cirrose/partidas/'+id,'PUT',{status:'agendado'});
        atualizarPartida(id, {status:'agendado'});
        renderStats(); renderPartidasManterPosicao(id);
        toast('Voltou para Aguardando','info');
    } catch(e) { toast('Erro: '+e.message,'error'); }
}

async function encerrarPartida(id) {
    const p = (D.partidas||[]).find(x=>x.id===id); if(!p) return;
    const n1=nomeById(p.j1Id), n2=nomeById(p.j2Id);
    if (p.gols1 === p.gols2) {
        if (p.fase === 'grupos') {
            // Empate na fase de grupos: 1 ponto cada, sem precisar escolher vencedor
            await salvarEncerramento(id, null);
        } else {
            // Mata-mata: empate exige escolha do vencedor (ex: pênaltis)
            encerrandoPartidaId = id;
            document.getElementById('modal-empate-info').textContent = `Empate ${p.gols1} × ${p.gols2} — quem avança? (ex: nos pênaltis)`;
            document.getElementById('modal-escolha-btns').innerHTML = `
                <button class="btn-escolha" onclick="confirmarVencedor(${p.j1Id})">🏆 ${esc(n1)}</button>
                <button class="btn-escolha" onclick="confirmarVencedor(${p.j2Id})">🏆 ${esc(n2)}</button>`;
            document.getElementById('modal-desempate').classList.add('show');
        }
        return;
    }
    const vencedorId = p.gols1 > p.gols2 ? p.j1Id : p.j2Id;
    await salvarEncerramento(id, vencedorId);
}

async function confirmarVencedor(vencedorId) {
    fecharDesempate();
    if (encerrandoPartidaId) await salvarEncerramento(encerrandoPartidaId, vencedorId);
}
function fecharDesempate() { document.getElementById('modal-desempate').classList.remove('show'); encerrandoPartidaId=null; }

async function salvarEncerramento(id, vencedorId) {
    try {
        await api('/api/cirrose/partidas/'+id,'PUT',{status:'encerrado',vencedorId});
        atualizarPartida(id, {status:'encerrado',vencedorId});
        await checarAvancoBracket((D.partidas||[]).find(p=>p.id===id));
        renderStats(); renderBannerMataMata(); renderPartidas();
        toast('Partida encerrada! 🏆','success');
    } catch(e) { toast('Erro: '+e.message,'error'); }
}

async function reabrirPartida(id) {
    try {
        await api('/api/cirrose/partidas/'+id,'PUT',{status:'agendado',vencedorId:null,gols1:0,gols2:0});
        atualizarPartida(id, {status:'agendado',vencedorId:null,gols1:0,gols2:0});
        renderStats(); renderPartidasManterPosicao(id);
        toast('Partida reaberta','info');
    } catch(e) { toast('Erro: '+e.message,'error'); }
}

async function ajustarGol(e, id, player, delta) {
    e.stopPropagation();
    const p = (D.partidas||[]).find(x=>x.id===id); if(!p) return;
    const field = player===1?'gols1':'gols2';
    const newVal = Math.max(0,(p[field]||0)+delta);
    try {
        await api('/api/cirrose/partidas/'+id,'PUT',{[field]:newVal});
        p[field]=newVal;
        const el=document.getElementById('g'+player+'-'+id);
        if(el){ el.textContent=newVal; el.style.transform='scale(1.3)'; setTimeout(()=>el.style.transform='',150); }
        if (delta > 0) {
            const div = document.createElement('div');
            div.className = 'gol-flash';
            div.textContent = '⚽ GOL!';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 950);
        }
    } catch(e) { toast('Erro: '+e.message,'error'); }
}

// ===== HELPERS =====
function renderPartidasManterPosicao(focoId) {
    const sy = window.scrollY;
    renderPartidas();
    window.scrollTo({top: sy, behavior:'instant'});
    if (focoId) {
        requestAnimationFrame(() => {
            const el = document.getElementById('pc-'+focoId);
            if (el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
        });
    }
}
function atualizarPartida(id, changes) {
    const idx=(D.partidas||[]).findIndex(p=>p.id===id);
    if(idx>=0) Object.assign(D.partidas[idx], changes);
}

async function checarAvancoBracket(p) {
    if (!p || p.fase==='grupos' || !p.vencedorId) return;
    const faseOrder=['oitavas','quartas','semifinal'];
    const faseIdx=faseOrder.indexOf(p.fase); if(faseIdx<0) return;
    const proxFase=faseOrder[faseIdx+1]||'final';
    const nextPos=Math.floor((p.bracketPos||0)/2);
    let next=(D.partidas||[]).find(x=>x.categoriaId===p.categoriaId&&x.fase===proxFase&&x.bracketPos===nextPos);
    const slot=(p.bracketPos||0)%2===0?'j1Id':'j2Id';
    if(!next){
        try{
            next=await api('/api/cirrose/partidas','POST',{categoriaId:p.categoriaId,chaveId:null,fase:proxFase,bracketPos:nextPos,[slot]:p.vencedorId,status:'agendado'});
            D.partidas.push(next);
        }catch(e){console.error(e);}
    } else {
        try{
            await api('/api/cirrose/partidas/'+next.id,'PUT',{[slot]:p.vencedorId});
            next[slot]=p.vencedorId;
        }catch(e){console.error(e);}
    }
    if(p.fase==='semifinal'){
        const semis=(D.partidas||[]).filter(x=>x.categoriaId===p.categoriaId&&x.fase==='semifinal'&&x.status==='encerrado');
        if(semis.length>=2){
            const perd=semis.map(s=>s.j1Id===s.vencedorId?s.j2Id:s.j1Id);
            const terceiro=(D.partidas||[]).find(x=>x.categoriaId===p.categoriaId&&x.fase==='terceiro');
            if(!terceiro&&perd[0]&&perd[1]){
                try{
                    const t=await api('/api/cirrose/partidas','POST',{categoriaId:p.categoriaId,chaveId:null,fase:'terceiro',bracketPos:0,j1Id:perd[0],j2Id:perd[1],status:'agendado'});
                    D.partidas.push(t);
                }catch(e){console.error(e);}
            }
        }
    }
}

// Auto-reload a cada 30s quando há partidas ao vivo
setInterval(async ()=>{
    const live=(D.partidas||[]).some(p=>p.status==='em_jogo');
    if(live){ try{ const d=await api('/api/cirrose'); Object.assign(D,d); renderStats(); renderPartidas(); }catch{} }
}, 30000);

init();
</script>
