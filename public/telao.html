<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏖️ Telão — Aninha do Beach</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:#0a0a1e;color:#fff;height:100vh;overflow:hidden}
        .bg{position:fixed;inset:0;z-index:0;overflow:hidden}
        .bg .g{position:absolute;inset:0;background:linear-gradient(135deg,#0a0a1e,#12123a 40%,#0d0d28 70%,#10102e)}
        .bg .o{position:absolute;border-radius:50%;filter:blur(120px);opacity:.2;animation:of 25s ease-in-out infinite}
        .bg .o:nth-child(2){width:600px;height:600px;background:#f59e0b;top:-200px;right:-200px}
        .bg .o:nth-child(3){width:700px;height:700px;background:#d97706;bottom:-250px;left:-250px;animation-delay:-8s}
        .bg .o:nth-child(4){width:400px;height:400px;background:#fbbf24;top:30%;left:50%;animation-delay:-16s}
        @keyframes of{0%,100%{transform:translate(0) scale(1)}25%{transform:translate(60px,-100px) scale(1.1)}50%{transform:translate(-40px,70px) scale(.9)}75%{transform:translate(80px,50px) scale(1.05)}}

        .wrap{position:relative;z-index:1;height:100vh;display:grid;grid-template-rows:auto 1fr auto;padding:24px 32px;gap:16px}

        /* HEADER */
        .header{display:flex;justify-content:space-between;align-items:center}
        .header h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#fbbf24,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .header-right{display:flex;align-items:center;gap:16px}
        .clock{font-size:2rem;font-weight:800;color:rgba(255,255,255,.25)}
        .status-badge{padding:6px 18px;border-radius:20px;font-size:.85rem;font-weight:700;text-transform:uppercase;animation:blink 2s infinite}
        .sb-live{background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.3)}
        @keyframes blink{50%{opacity:.6}}

        /* MAIN AREA */
        .main{display:grid;grid-template-columns:2fr 1fr;gap:20px;overflow:hidden}

        /* LEFT - jogos em andamento */
        .left{display:flex;flex-direction:column;gap:12px;overflow-y:auto}
        .section-title{font-size:1rem;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;display:flex;align-items:center;gap:8px}

        .live-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:20px 24px;display:flex;align-items:center;gap:20px;animation:fadeIn .5s ease}
        .live-card.chamando{border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.06);animation:chamadaPulse 2s infinite}
        @keyframes fadeIn{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
        @keyframes chamadaPulse{0%,100%{opacity:1}50%{opacity:.7}}

        .lc-quadra{font-size:.75rem;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;min-width:90px;text-align:center}
        .lc-quadra .qn{font-size:1.1rem;font-weight:800;color:#fbbf24}
        .lc-teams{flex:1;display:flex;flex-direction:column;gap:4px}
        .lc-team{display:flex;align-items:center;gap:10px;font-size:1.2rem;font-weight:700}
        .lc-team.winner{color:#6ee7b7}
        .lc-vs{font-size:.7rem;color:rgba(255,255,255,.15);text-align:center;font-weight:400}
        .lc-score{font-size:2rem;font-weight:900;color:#fbbf24;letter-spacing:2px;text-align:right;min-width:140px}
        .lc-meta{font-size:.7rem;color:rgba(255,255,255,.2);text-align:center}
        .lc-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.7rem;font-weight:700;text-transform:uppercase;margin-top:4px}
        .lb-em_jogo{background:rgba(56,239,125,.12);color:#6ee7b7}
        .lb-chamando{background:rgba(99,102,241,.2);color:#a5b4fc;font-size:.85rem}

        /* RIGHT - sidebar */
        .right{display:flex;flex-direction:column;gap:12px;overflow-y:auto}
        .next-card{padding:12px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;display:flex;align-items:center;gap:12px}
        .nc-hora{font-size:.8rem;font-weight:700;color:rgba(255,255,255,.25);min-width:44px}
        .nc-info{flex:1;font-size:.88rem;font-weight:600}
        .nc-cat{font-size:.7rem;color:rgba(255,255,255,.2)}

        .result-card{padding:10px 14px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);border-radius:12px;font-size:.82rem}
        .rc-teams{font-weight:600;display:flex;justify-content:space-between;align-items:center}
        .rc-score{font-weight:800;color:#fbbf24}
        .rc-meta{font-size:.68rem;color:rgba(255,255,255,.2);margin-top:2px}

        /* CHAMADA BANNER */
        .chamada-banner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:10;background:linear-gradient(135deg,rgba(99,102,241,.95),rgba(139,92,246,.95));padding:20px 32px;text-align:center;animation:slideUp .5s ease}
        .chamada-banner.show{display:block}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .chamada-banner .cb-title{font-size:1.5rem;font-weight:800;margin-bottom:4px}
        .chamada-banner .cb-detail{font-size:1rem;color:rgba(255,255,255,.7)}

        /* FOOTER (ticker) */
        .footer{border-top:1px solid rgba(255,255,255,.06);padding-top:8px;overflow:hidden;white-space:nowrap}
        .ticker{display:inline-block;animation:ticker 30s linear infinite}
        @keyframes ticker{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
        .ticker span{margin-right:40px;font-size:.82rem;color:rgba(255,255,255,.3)}

        .empty{color:rgba(255,255,255,.1);font-style:italic;padding:20px;text-align:center;font-size:.9rem}

        /* FINAL - PODIO & STATS OVERLAY */
        .final-overlay{position:fixed;inset:0;z-index:50;background:rgba(10,10,30,.96);display:none;flex-direction:column;overflow-y:auto}
        .final-overlay.show{display:flex}
        .final-wrap{max-width:1100px;margin:0 auto;padding:32px 24px;width:100%}
        .final-header{text-align:center;margin-bottom:30px}
        .final-trophy{font-size:5rem;animation:trophy-bounce 1.5s ease infinite}
        @keyframes trophy-bounce{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.15) rotate(2deg)}}
        .final-title{font-size:2.4rem;font-weight:900;background:linear-gradient(135deg,#fbbf24,#f59e0b,#d97706,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 2s ease infinite;background-size:200% auto}
        @keyframes shimmer{0%{background-position:0% center}50%{background-position:100% center}100%{background-position:0% center}}

        .podium-section{margin-bottom:36px}
        .podium-cat-title{font-size:1.1rem;font-weight:700;color:#fbbf24;margin-bottom:16px;text-align:center;text-transform:uppercase;letter-spacing:1px}
        .podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;max-width:520px;margin:0 auto}
        .podium-place{display:flex;flex-direction:column;align-items:center;text-align:center;flex:1;max-width:170px}
        .podium-medal{font-size:2.8rem;margin-bottom:8px}
        .podium-team{font-size:.95rem;font-weight:700;color:#fff;margin-bottom:4px;word-break:break-word}
        .podium-result{font-size:.68rem;color:rgba(255,255,255,.35)}
        .podium-bar{width:100%;border-radius:12px 12px 0 0;margin-top:10px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;font-size:1.5rem;font-weight:900}
        .podium-bar.gold{height:130px;background:linear-gradient(to top,#d97706,#fbbf24);color:#fff}
        .podium-bar.silver{height:95px;background:linear-gradient(to top,#6b7280,#9ca3af);color:#fff}
        .podium-bar.bronze{height:68px;background:linear-gradient(to top,#92400e,#d97706);color:#fff}

        .final-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:28px}
        .fstat{text-align:center;padding:16px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px}
        .fstat .fval{font-size:1.8rem;font-weight:800;color:#fbbf24}
        .fstat .flabel{font-size:.68rem;color:rgba(255,255,255,.3);text-transform:uppercase;margin-top:3px}

        .final-ranking{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:24px}
        .final-ranking th{text-align:left;padding:10px;font-weight:700;color:rgba(255,255,255,.4);border-bottom:1px solid rgba(255,255,255,.1);font-size:.72rem;text-transform:uppercase}
        .final-ranking td{padding:10px;color:rgba(255,255,255,.7);border-bottom:1px solid rgba(255,255,255,.04)}
        .final-ranking tr:hover td{background:rgba(255,255,255,.02)}
        .final-section-title{font-size:1rem;font-weight:700;color:rgba(255,255,255,.5);margin:20px 0 12px;text-align:center}

        .confetti-piece{position:fixed;width:10px;height:10px;z-index:201;animation:confetti-fall linear forwards;pointer-events:none;border-radius:2px}
        @keyframes confetti-fall{0%{opacity:1;transform:translateY(-10vh) rotate(0deg)}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}
    </style>
</head>
<body>
<div class="bg"><div class="g"></div><div class="o"></div><div class="o"></div><div class="o"></div></div>

<div class="wrap">
    <div class="header">
        <h1>🏖️ <span id="t-nome">Aninha do Beach</span></h1>
        <div class="header-right">
            <div class="status-badge sb-live" id="t-status">🔴 AO VIVO</div>
            <div class="clock" id="t-clock">00:00</div>
        </div>
    </div>

    <div class="main">
        <div class="left">
            <div class="section-title">🔴 Jogos em Andamento</div>
            <div id="live-games"></div>
        </div>
        <div class="right">
            <div class="section-title">⏳ Próximos</div>
            <div id="next-games"></div>
            <div class="section-title" style="margin-top:8px">✅ Últimos Resultados</div>
            <div id="results"></div>
        </div>
    </div>

    <div class="footer">
        <div class="ticker" id="ticker"></div>
    </div>
</div>

<div class="chamada-banner" id="chamada-banner">
    <div class="cb-title" id="cb-title"></div>
    <div class="cb-detail" id="cb-detail"></div>
</div>

<!-- FINAL OVERLAY (pódio + stats) -->
<div class="final-overlay" id="final-overlay">
    <div class="final-wrap">
        <div class="final-header">
            <div class="final-trophy">🏆</div>
            <div class="final-title">CAMPEONATO ENCERRADO!</div>
        </div>
        <div id="final-podio"></div>
        <div class="final-section-title">📊 Estatísticas Gerais</div>
        <div id="final-stats"></div>
        <div class="final-section-title">📋 Ranking de Duplas</div>
        <div id="final-ranking"></div>
    </div>
</div>

<script>
let D = {};

async function load() {
    try {
        const r = await fetch('/api/campeonato');
        D = await r.json();
        render();
    } catch(e) { console.error(e); }
}

function connectWS() {
    const ws = new WebSocket('ws://'+location.host);
    ws.onmessage = e => {
        try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'partida-update') {
                const idx = D.partidas.findIndex(p=>p.id===msg.partida.id);
                if (idx>=0) D.partidas[idx]=msg.partida; else D.partidas.push(msg.partida);
                render();
            }
            if (msg.type === 'chamada-quadra') {
                showChamada(msg);
            }
        } catch(err){}
    };
    ws.onclose = () => setTimeout(connectWS, 3000);
}

function render() {
    document.getElementById('t-nome').textContent = D.evento?.nome || 'Aninha do Beach';
    renderLive();
    renderNext();
    renderResults();
    renderTicker();
    checkFinalizado();
}

function renderLive() {
    const el = document.getElementById('live-games');
    const partidas = (D.partidas||[]).filter(p=>p.status==='em_jogo'||p.status==='chamando');
    if (!partidas.length) { el.innerHTML = '<div class="empty">Nenhum jogo em andamento</div>'; return; }
    el.innerHTML = partidas.map(p=>{
        const d1 = findDupla(p.dupla1Id), d2 = findDupla(p.dupla2Id);
        const q = (D.quadras||[]).find(qq=>qq.id===p.quadraId);
        const cat = findCat(p.categoriaId);
        const placar = formatPlacar(p);
        const w = p.vencedor;
        return `<div class="live-card ${p.status}">
            <div class="lc-quadra">
                <div class="qn">${esc(q?.nome||'—')}</div>
                <div class="lc-badge lb-${p.status}">${p.status==='chamando'?'📣 CHAMANDO':'AO VIVO'}</div>
            </div>
            <div class="lc-teams">
                <div class="lc-team${w===p.dupla1Id?' winner':''}">${esc(dLabel(d1))}</div>
                <div class="lc-vs">vs</div>
                <div class="lc-team${w===p.dupla2Id?' winner':''}">${esc(dLabel(d2))}</div>
                <div class="lc-meta">${cat?esc(cat.nome):''} · ${p.fase||''}</div>
            </div>
            <div class="lc-score">${placar||'0×0'}</div>
        </div>`;
    }).join('');
}

function renderNext() {
    const el = document.getElementById('next-games');
    const partidas = (D.partidas||[]).filter(p=>p.status==='agendado').sort((a,b)=>(a.horario||'').localeCompare(b.horario||'')).slice(0,6);
    if (!partidas.length) { el.innerHTML = '<div class="empty">—</div>'; return; }
    el.innerHTML = partidas.map(p=>{
        const d1 = findDupla(p.dupla1Id), d2 = findDupla(p.dupla2Id);
        const cat = findCat(p.categoriaId);
        const hora = p.horario ? new Date(p.horario).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '--:--';
        return `<div class="next-card">
            <span class="nc-hora">${hora}</span>
            <div>
                <div class="nc-info">${esc(dLabel(d1))} vs ${esc(dLabel(d2))}</div>
                <div class="nc-cat">${cat?esc(cat.nome):''} · ${p.fase||''}</div>
            </div>
        </div>`;
    }).join('');
}

function renderResults() {
    const el = document.getElementById('results');
    const partidas = (D.partidas||[]).filter(p=>p.status==='encerrado'||p.status==='wo').sort((a,b)=>(b.horario||'').localeCompare(a.horario||'')).slice(0,6);
    if (!partidas.length) { el.innerHTML = '<div class="empty">—</div>'; return; }
    el.innerHTML = partidas.map(p=>{
        const d1 = findDupla(p.dupla1Id), d2 = findDupla(p.dupla2Id);
        const cat = findCat(p.categoriaId);
        const w = p.vencedor;
        return `<div class="result-card">
            <div class="rc-teams">
                <span>${esc(dLabel(d1))}${w===p.dupla1Id?' 🏆':''} vs ${esc(dLabel(d2))}${w===p.dupla2Id?' 🏆':''}</span>
                <span class="rc-score">${formatPlacar(p)}</span>
            </div>
            <div class="rc-meta">${cat?esc(cat.nome):''} · ${p.fase||''} ${p.status==='wo'?'· WO':''}</div>
        </div>`;
    }).join('');
}

function renderTicker() {
    const msgs = (D.mensagens||[]).map(m=>m.texto);
    const cats = (D.categorias||[]).map(c=>'🏐 '+c.nome);
    const items = [...msgs, ...cats];
    if (!items.length) items.push('🏖️ Aninha do Beach — Beach Tennis');
    document.getElementById('ticker').innerHTML = items.map(i=>`<span>${esc(i)}</span>`).join('');
}

function showChamada(msg) {
    const banner = document.getElementById('chamada-banner');
    document.getElementById('cb-title').textContent = `📣 ${msg.quadra?.nome||'Quadra'} — Apresentar-se!`;
    document.getElementById('cb-detail').textContent = `${dLabel(msg.dupla1)} vs ${dLabel(msg.dupla2)} — ${msg.categoria?.nome||''}`;
    banner.classList.add('show');
    setTimeout(()=>banner.classList.remove('show'), 15000);
}

// Clock
function updateClock() {
    const now = new Date();
    document.getElementById('t-clock').textContent = now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000); updateClock();

// Helpers
function findDupla(id){return(D.duplas||[]).find(d=>d.id===id)}
function findCat(id){return(D.categorias||[]).find(c=>c.id===id)}
function dLabel(d){return d?.nome||'?'}
function esc(t){const d=document.createElement('div');d.textContent=t||'';return d.innerHTML}
function formatPlacar(p){if(!p.placar)return'';const s1=p.placar.dupla1||[],s2=p.placar.dupla2||[];return s1.map((v,i)=>`${v}×${s2[i]||0}`).join(' ')}

// ===== FINAL: PÓDIO + STATS =====
let finalShown = false;

function checkFinalizado() {
    const cats = D.categorias || [];
    const partidas = D.partidas || [];
    if (!cats.length || !partidas.length) return;

    // Verifica se TODAS as categorias têm final encerrada
    const todasFinalizadas = cats.every(cat => {
        const mmPartidas = partidas.filter(p => p.categoriaId === cat.id && p.fase !== 'grupos');
        if (!mmPartidas.length) return false;
        const finalMatch = mmPartidas.find(p => p.fase === 'final');
        return finalMatch && (finalMatch.status === 'encerrado' || finalMatch.status === 'wo') && finalMatch.vencedor;
    });

    if (!todasFinalizadas) return;

    renderFinalPodio();
    renderFinalStats();
    renderFinalRanking();

    const overlay = document.getElementById('final-overlay');
    if (!overlay.classList.contains('show')) {
        overlay.classList.add('show');
        if (!finalShown) {
            finalShown = true;
            spawnConfetti(overlay);
            document.getElementById('t-status').textContent = '🏆 ENCERRADO';
            document.getElementById('t-status').className = 'status-badge';
            document.getElementById('t-status').style.background = 'rgba(251,191,36,.2)';
            document.getElementById('t-status').style.color = '#fbbf24';
            document.getElementById('t-status').style.border = '1px solid rgba(251,191,36,.3)';
        }
    }
}

function renderFinalPodio() {
    const el = document.getElementById('final-podio');
    const cats = D.categorias || [];
    let html = '';
    cats.forEach(cat => {
        const mmPartidas = (D.partidas||[]).filter(p => p.categoriaId === cat.id && p.fase !== 'grupos');
        const finalMatch = mmPartidas.find(p => p.fase === 'final' && (p.status === 'encerrado' || p.status === 'wo'));
        if (!finalMatch) return;

        const campeao = findDupla(finalMatch.vencedor);
        const viceId = finalMatch.dupla1Id === finalMatch.vencedor ? finalMatch.dupla2Id : finalMatch.dupla1Id;
        const vice = findDupla(viceId);

        const semiMatches = mmPartidas.filter(p => p.fase === 'semifinal' && (p.status === 'encerrado' || p.status === 'wo'));
        const terceiros = semiMatches.map(m => {
            const loserId = m.dupla1Id === m.vencedor ? m.dupla2Id : m.dupla1Id;
            return findDupla(loserId);
        }).filter(Boolean);

        html += `<div class="podium-section">
            <div class="podium-cat-title">🏐 ${esc(cat.nome)}</div>
            <div class="podium">
                <div class="podium-place">
                    <div class="podium-medal">🥈</div>
                    <div class="podium-team">${vice ? esc(dLabel(vice)) : '?'}</div>
                    <div class="podium-result">Vice-campeão</div>
                    <div class="podium-bar silver">2°</div>
                </div>
                <div class="podium-place">
                    <div class="podium-medal">🥇</div>
                    <div class="podium-team">${campeao ? esc(dLabel(campeao)) : '?'}</div>
                    <div class="podium-result">Campeão!</div>
                    <div class="podium-bar gold">1°</div>
                </div>
                <div class="podium-place">
                    <div class="podium-medal">🥉</div>
                    <div class="podium-team">${terceiros.length ? terceiros.map(t=>esc(dLabel(t))).join(' / ') : '?'}</div>
                    <div class="podium-result">3° lugar</div>
                    <div class="podium-bar bronze">3°</div>
                </div>
            </div>
        </div>`;
    });
    el.innerHTML = html;
}

function renderFinalStats() {
    const el = document.getElementById('final-stats');
    const partidas = D.partidas || [];
    const encerradas = partidas.filter(p => p.status === 'encerrado' || p.status === 'wo');
    const emGrupos = partidas.filter(p => p.fase === 'grupos').length;
    const emMM = partidas.filter(p => p.fase !== 'grupos').length;

    let totalGames = 0, totalSets = 0, woCount = 0;
    encerradas.forEach(p => {
        if (p.status === 'wo') woCount++;
        const s1 = p.placar?.dupla1 || [], s2 = p.placar?.dupla2 || [];
        totalSets += Math.max(s1.length, s2.length);
        s1.forEach((g, i) => { totalGames += g + (s2[i] || 0); });
    });

    let longestGames = 0;
    encerradas.forEach(p => {
        const g = (p.placar?.dupla1||[]).reduce((s,v,i) => s + v + (p.placar?.dupla2?.[i]||0), 0);
        if (g > longestGames) longestGames = g;
    });

    el.innerHTML = `<div class="final-stats">
        <div class="fstat"><div class="fval">${partidas.length}</div><div class="flabel">Total Partidas</div></div>
        <div class="fstat"><div class="fval">${encerradas.length}</div><div class="flabel">Encerradas</div></div>
        <div class="fstat"><div class="fval">${emGrupos}</div><div class="flabel">Fase de Grupos</div></div>
        <div class="fstat"><div class="fval">${emMM}</div><div class="flabel">Mata-Mata</div></div>
        <div class="fstat"><div class="fval">${totalSets}</div><div class="flabel">Total Sets</div></div>
        <div class="fstat"><div class="fval">${totalGames}</div><div class="flabel">Total Games</div></div>
        <div class="fstat"><div class="fval">${longestGames}</div><div class="flabel">Maior Partida</div></div>
        <div class="fstat"><div class="fval">${woCount}</div><div class="flabel">WOs</div></div>
    </div>`;
}

function renderFinalRanking() {
    const el = document.getElementById('final-ranking');
    const encerradas = (D.partidas||[]).filter(p => p.status === 'encerrado' || p.status === 'wo');
    const duplaStats = {};
    encerradas.forEach(p => {
        [p.dupla1Id, p.dupla2Id].forEach(did => {
            if (!did) return;
            if (!duplaStats[did]) duplaStats[did] = { id: did, partidas: 0, vitorias: 0, derrotas: 0, gamesW: 0, gamesL: 0 };
            duplaStats[did].partidas++;
            if (p.vencedor === did) duplaStats[did].vitorias++; else duplaStats[did].derrotas++;
            const mine = p.dupla1Id === did ? (p.placar?.dupla1||[]) : (p.placar?.dupla2||[]);
            const opp = p.dupla1Id === did ? (p.placar?.dupla2||[]) : (p.placar?.dupla1||[]);
            mine.forEach((g, i) => { duplaStats[did].gamesW += g; duplaStats[did].gamesL += (opp[i]||0); });
        });
    });
    const sorted = Object.values(duplaStats).sort((a,b) => b.vitorias - a.vitorias || (b.gamesW-b.gamesL) - (a.gamesW-a.gamesL));
    if (!sorted.length) { el.innerHTML = ''; return; }

    let html = `<table class="final-ranking"><thead><tr><th>#</th><th>Dupla</th><th>Cat.</th><th>V</th><th>D</th><th>Games +/−</th></tr></thead><tbody>`;
    sorted.forEach((s, i) => {
        const dup = findDupla(s.id);
        const cat = dup ? findCat(dup.categoriaId) : null;
        html += `<tr><td style="color:#fbbf24;font-weight:800">${i+1}</td><td style="font-weight:600">${esc(dLabel(dup))}</td><td style="color:rgba(255,255,255,.35);font-size:.75rem">${cat?esc(cat.nome):''}</td><td style="color:#6ee7b7;font-weight:700">${s.vitorias}</td><td style="color:#f87171">${s.derrotas}</td><td>${s.gamesW}−${s.gamesL} (${s.gamesW-s.gamesL>0?'+':''}${s.gamesW-s.gamesL})</td></tr>`;
    });
    html += '</tbody></table>';
    el.innerHTML = html;
}

function spawnConfetti(container) {
    const colors = ['#fbbf24','#f59e0b','#d97706','#6ee7b7','#a5b4fc','#f87171','#fff','#38ef7d'];
    for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random()*colors.length)];
        piece.style.width = (6 + Math.random()*10) + 'px';
        piece.style.height = (6 + Math.random()*10) + 'px';
        piece.style.animationDuration = (2.5 + Math.random()*3) + 's';
        piece.style.animationDelay = Math.random()*2.5 + 's';
        piece.style.borderRadius = Math.random()>.5 ? '50%' : '2px';
        container.appendChild(piece);
    }
}

load();
connectWS();
setInterval(load, 15000);
</script>
